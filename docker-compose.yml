services:

  coordinator:
    image: python:3.11-slim
    container_name: mpc-coordinator
    working_dir: /app
    volumes:
      - ./coordinator:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn requests &&
             uvicorn app:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
    networks:
      mpc-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped


  node1:
    build: ./mpc-node
    container_name: mpc-node-1
    environment:
      - NODE_ID=node-1
      - COORDINATOR_URL=http://mpc-coordinator:9000
    ports:
      - "8001:8000"
    depends_on:
      - coordinator
    networks:
      mpc-net:
        ipv4_address: 172.28.0.11
    restart: unless-stopped


  node2:
    build: ./mpc-node
    container_name: mpc-node-2
    environment:
      - NODE_ID=node-2
      - COORDINATOR_URL=http://mpc-coordinator:9000
    ports:
      - "8002:8000"
    depends_on:
      - coordinator
    networks:
      mpc-net:
        ipv4_address: 172.28.0.12
    restart: unless-stopped


  node3:
    build: ./mpc-node
    container_name: mpc-node-3
    environment:
      - NODE_ID=node-3
      - COORDINATOR_URL=http://mpc-coordinator:9000
    ports:
      - "8003:8000"
    depends_on:
      - coordinator
    networks:
      mpc-net:
        ipv4_address: 172.28.0.13
    restart: unless-stopped


networks:
  mpc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
